name: finders-keepers

services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # ":?" makes compose REFUSE to start if these are unset, rather than pass
      # a blank string. MinIO treats blank as "unset" and silently falls back to
      # its documented default credentials (minioadmin/minioadmin) - producing a
      # healthy container guarding all media with a password the whole internet
      # knows. Fail loudly instead.
      # Quoted: the ":?" message must not contain an unquoted ": " or YAML reads
      # it as a nested mapping.
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required - see .env.production.example}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required - generate one with openssl rand -hex 24}"
    volumes:
      # Named volume => uploaded media survives container replacement and
      # rebuilds. Back this up alongside the database (see DEPLOY.md).
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No ports published. The API reaches MinIO over the internal network, and
    # public reads arrive through Caddy. The admin console (9001) is deliberately
    # NOT exposed - reach it with an SSH tunnel if you need it:
    #   ssh -L 9001:localhost:9001 root@<server>  (after adding a temporary port)
    networks:
      - internal

  api:
    build:
      context: ./finders-keepers-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CUSTOMER_JWT_SECRET: ${CUSTOMER_JWT_SECRET}
      CUSTOMER_JWT_REFRESH_SECRET: ${CUSTOMER_JWT_REFRESH_SECRET}
      # Object storage for uploaded media. MINIO_ENDPOINT is internal-only:
      # public reads go through Caddy at https://${API_DOMAIN}/uploads/...
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      MINIO_BUCKET: ${MINIO_BUCKET:-uploads}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      FRONTEND_URL: https://${WEB_DOMAIN}
      # Public base for media URLs. Unchanged by the move to MinIO: the bucket is
      # named "uploads", so MinIO serves each object at the same /uploads/<key>
      # path the disk backend used, and no stored URL had to be rewritten.
      PUBLIC_MEDIA_BASE_URL: https://${API_DOMAIN}
      # Read-only fallback for any pre-MinIO StorageType.LOCAL row.
      UPLOADS_DIR: /app/uploads
    volumes:
      # Retained so existing LOCAL assets stay readable and the previous release
      # can be rolled back to. MinIO owns all new uploads (minio_data).
      - uploads:/app/uploads
    networks:
      - internal

  admin:
    build:
      context: ./finders-keepers-admin
      args:
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
        NEXT_PUBLIC_STORE_NAME: ${STORE_NAME}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal

  web:
    build:
      context: ./finders-keepers-web
      args:
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
        NEXT_PUBLIC_STORE_NAME: ${STORE_NAME}
        # Baked in at build time (Next inlines NEXT_PUBLIC_* into the bundle).
        # Drives canonical URLs, sitemap.xml and robots.txt.
        NEXT_PUBLIC_SITE_URL: https://${WEB_DOMAIN}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      WEB_DOMAIN: ${WEB_DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - admin
      - api
    networks:
      - internal

volumes:
  pgdata:
  minio_data:
  # Legacy: pre-MinIO StorageType.LOCAL assets. Do not remove while any LOCAL
  # row exists, or those images 404.
  uploads:
  caddy_data:
  caddy_config:

networks:
  internal:
