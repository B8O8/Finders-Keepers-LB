name: finders-keepers

services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ./finders-keepers-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CUSTOMER_JWT_SECRET: ${CUSTOMER_JWT_SECRET}
      CUSTOMER_JWT_REFRESH_SECRET: ${CUSTOMER_JWT_REFRESH_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      FRONTEND_URL: https://${WEB_DOMAIN}
      # Uploaded media: stored on a persistent named volume, served at /uploads
      UPLOADS_DIR: /app/uploads
      PUBLIC_MEDIA_BASE_URL: https://${API_DOMAIN}
    volumes:
      # Named volume => survives container rebuild/replacement and restarts.
      # Backed up separately from the database (see DEPLOY.md).
      - uploads:/app/uploads
    networks:
      - internal

  admin:
    build:
      context: ./finders-keepers-admin
      args:
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
        NEXT_PUBLIC_STORE_NAME: ${STORE_NAME}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal

  web:
    build:
      context: ./finders-keepers-web
      args:
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
        NEXT_PUBLIC_STORE_NAME: ${STORE_NAME}
        # Baked in at build time (Next inlines NEXT_PUBLIC_* into the bundle).
        # Drives canonical URLs, sitemap.xml and robots.txt.
        NEXT_PUBLIC_SITE_URL: https://${WEB_DOMAIN}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      WEB_DOMAIN: ${WEB_DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - admin
      - api
    networks:
      - internal

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:

networks:
  internal:
